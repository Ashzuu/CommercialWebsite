services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commercial-website
    env_file:
      - .env
    environment:
      - PORT=12301
    networks:
      - proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  proxy:
    external: true
